<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#dc2626">
    <title>Motos - Revisão Moto</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" href="./assets/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<!-- ============================================================ -->
<!-- HEADER                                                          -->
<!-- ============================================================ -->
<header class="header-app p-4">
    <div class="flex items-center justify-between max-w-2xl mx-auto">
        <div class="flex items-center gap-3">
            <a href="./index.html" class="text-slate-300 hover:text-white text-xl leading-none">←</a>
            <h1 class="text-lg font-bold">Motos cadastradas</h1>
        </div>
        <button onclick="abrirFormNovo()"
                class="bg-red-600 hover:bg-red-700 text-white font-semibold px-3 py-1.5 rounded-lg text-sm">
            + Nova
        </button>
    </div>
</header>

<!-- ============================================================ -->
<!-- TELA LISTA                                                      -->
<!-- ============================================================ -->
<main id="tela-lista" class="p-4 max-w-2xl mx-auto">
    <!-- Filtros -->
    <div class="bg-white rounded-xl p-3 shadow-sm mb-4 space-y-2">
        <div class="grid grid-cols-2 gap-2">
            <input type="text" id="filtro-placa" placeholder="Filtrar placa"
                   class="px-3 py-2 border border-slate-300 rounded-lg text-sm"
                   oninput="filtrarLista()">
            <input type="text" id="filtro-proprietario" placeholder="Filtrar proprietário"
                   class="px-3 py-2 border border-slate-300 rounded-lg text-sm"
                   oninput="filtrarLista()">
        </div>
        <div class="flex items-center justify-between text-xs text-slate-500">
            <span id="contador-lista">Carregando...</span>
            <label class="flex items-center gap-1.5">
                <input type="checkbox" id="mostrar-arquivadas" onchange="carregarMotos()">
                <span>Mostrar arquivadas</span>
            </label>
        </div>
    </div>

    <!-- Lista de motos -->
    <div id="lista-motos" class="space-y-3">
        <p class="text-slate-500 text-sm text-center py-8">Carregando...</p>
    </div>

    <!-- Paginacao -->
    <div id="paginacao" class="mt-4 flex items-center justify-between hidden">
        <button onclick="mudarPagina(-1)" id="btn-pag-anterior"
                class="px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm font-medium disabled:opacity-50">
            ← Anterior
        </button>
        <span id="pag-info" class="text-sm text-slate-600"></span>
        <button onclick="mudarPagina(1)" id="btn-pag-proxima"
                class="px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm font-medium disabled:opacity-50">
            Próxima →
        </button>
    </div>
</main>

<!-- ============================================================ -->
<!-- MODAL: FORMULÁRIO (cadastro / edição)                          -->
<!-- ============================================================ -->
<div id="modal-form" class="fixed inset-0 bg-black/60 z-50 hidden items-start sm:items-center justify-center p-3 overflow-y-auto">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md my-4">
        <div class="p-4 border-b border-slate-200 flex items-center justify-between sticky top-0 bg-white rounded-t-2xl">
            <h2 id="form-titulo" class="text-lg font-bold text-slate-900">Nova moto</h2>
            <button onclick="fecharModal('modal-form')" class="text-slate-500 hover:text-slate-900 text-2xl leading-none px-2">×</button>
        </div>

        <form id="form-moto" class="p-4 space-y-3" onsubmit="salvarMoto(event)">
            <input type="hidden" id="moto-id">

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    Placa <span class="text-red-600">*</span>
                </label>
                <input type="text" id="moto-placa" required maxlength="8"
                       pattern="[A-Za-z]{3}-?[0-9][A-Za-z0-9][0-9]{2}"
                       placeholder="ABC-1234 ou ABC1D23"
                       class="w-full px-3 py-2 border border-slate-300 rounded-lg uppercase"
                       title="Formato Mercosul (ABC1D23) ou antigo (ABC-1234)">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">
                    Modelo <span class="text-red-600">*</span>
                </label>
                <select id="moto-modelo" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-white">
                    <option value="">Selecione...</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Ano</label>
                    <input type="number" id="moto-ano" min="1950" max="2030"
                           class="w-full px-3 py-2 border border-slate-300 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Cor</label>
                    <input type="text" id="moto-cor" maxlength="30"
                           class="w-full px-3 py-2 border border-slate-300 rounded-lg">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Chassi</label>
                    <input type="text" id="moto-chassi" maxlength="17"
                           class="w-full px-3 py-2 border border-slate-300 rounded-lg uppercase">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Renavam</label>
                    <input type="text" id="moto-renavam" maxlength="11" inputmode="numeric"
                           class="w-full px-3 py-2 border border-slate-300 rounded-lg">
                </div>
            </div>

            <hr class="my-2">
            <p class="text-xs font-semibold text-slate-500 uppercase">Proprietário</p>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Nome</label>
                <input type="text" id="moto-proprietario" maxlength="100"
                       class="w-full px-3 py-2 border border-slate-300 rounded-lg">
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Telefone</label>
                    <input type="tel" id="moto-telefone" maxlength="20"
                           placeholder="(27) 99999-9999"
                           class="w-full px-3 py-2 border border-slate-300 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">E-mail</label>
                    <input type="email" id="moto-email" maxlength="100"
                           class="w-full px-3 py-2 border border-slate-300 rounded-lg">
                </div>
            </div>

            <hr class="my-2">

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Data compra</label>
                    <input type="date" id="moto-data-compra"
                           class="w-full px-3 py-2 border border-slate-300 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Km atual</label>
                    <input type="number" id="moto-km" min="0" inputmode="numeric"
                           class="w-full px-3 py-2 border border-slate-300 rounded-lg">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Observações</label>
                <textarea id="moto-observacoes" rows="2" maxlength="500"
                          class="w-full px-3 py-2 border border-slate-300 rounded-lg"></textarea>
            </div>

            <p id="form-erro" class="text-red-600 text-sm hidden"></p>

            <div class="flex gap-2 pt-2">
                <button type="button" onclick="fecharModal('modal-form')"
                        class="flex-1 px-4 py-2.5 border border-slate-300 rounded-lg font-medium">
                    Cancelar
                </button>
                <button type="submit" id="btn-salvar"
                        class="flex-1 px-4 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-lg font-semibold">
                    Salvar
                </button>
            </div>
        </form>
    </div>
</div>

<!-- ============================================================ -->
<!-- MODAL: QUICK ACTION DE KM                                       -->
<!-- ============================================================ -->
<div id="modal-km" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center p-3">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-5">
        <h2 class="text-lg font-bold text-slate-900 mb-1">Atualizar km</h2>
        <p id="km-info" class="text-sm text-slate-600 mb-4"></p>
        <input type="number" id="km-novo" min="0" inputmode="numeric"
               class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-lg mb-4">
        <div class="flex gap-2">
            <button onclick="fecharModal('modal-km')"
                    class="flex-1 px-4 py-2.5 border border-slate-300 rounded-lg font-medium">
                Cancelar
            </button>
            <button onclick="salvarKm()"
                    class="flex-1 px-4 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-lg font-semibold">
                Salvar
            </button>
        </div>
    </div>
</div>

<!-- ============================================================ -->
<!-- MODAL: CONFIRMAR DELETE                                         -->
<!-- ============================================================ -->
<div id="modal-delete" class="fixed inset-0 bg-black/60 z-50 hidden items-center justify-center p-3">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-5">
        <h2 class="text-lg font-bold text-slate-900 mb-2">Arquivar moto?</h2>
        <p id="delete-info" class="text-sm text-slate-600 mb-4"></p>
        <p class="text-xs text-slate-500 mb-4">A moto não será apagada permanentemente, apenas arquivada. Você pode reativá-la depois.</p>
        <div class="flex gap-2">
            <button onclick="fecharModal('modal-delete')"
                    class="flex-1 px-4 py-2.5 border border-slate-300 rounded-lg font-medium">
                Cancelar
            </button>
            <button onclick="confirmarDelete()"
                    class="flex-1 px-4 py-2.5 bg-red-600 hover:bg-red-700 text-white rounded-lg font-semibold">
                Arquivar
            </button>
        </div>
    </div>
</div>

<!-- ============================================================ -->
<!-- SCRIPTS                                                          -->
<!-- ============================================================ -->
<script src="./src/supabase-client.js"></script>
<script src="./src/auth.js"></script>
<script>
// ================================================================
// ESTADO GLOBAL
// ================================================================
const PAGE_SIZE = 50;
let estadoLista = {
    motos: [],
    filtradas: [],
    pagina: 0,
    modelos: [],
    motoEdicao: null,
    motoDelete: null,
    motoKm: null
};

// ================================================================
// BOOT
// ================================================================
async function boot() {
    await exigirLogin();
    await carregarModelos();
    await carregarMotos();
}

function toast(mensagem, tipo = 'sucesso') {
    const el = document.createElement('div');
    el.className = `toast ${tipo}`;
    el.textContent = mensagem;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

// ================================================================
// CARREGAMENTO
// ================================================================
async function carregarModelos() {
    try {
        const { data, error } = await window.sb
            .from('modelos').select('id, nome, plataforma')
            .eq('ativo', true).order('nome');
        if (error) throw error;
        estadoLista.modelos = data;

        // Popula select do form
        const sel = document.getElementById('moto-modelo');
        sel.innerHTML = '<option value="">Selecione...</option>' +
            data.map(m => `<option value="${m.id}">${m.nome}</option>`).join('');
    } catch (e) {
        console.error('Erro ao carregar modelos:', e);
        toast('Erro ao carregar modelos', 'erro');
    }
}

async function carregarMotos() {
    const arquivadas = document.getElementById('mostrar-arquivadas').checked;
    const viewName = arquivadas ? 'vw_motos_arquivadas' : 'vw_motos_status';

    try {
        const { data, error } = await window.sb
            .from(viewName).select('*').order('placa');
        if (error) throw error;
        estadoLista.motos = data || [];
        estadoLista.pagina = 0;
        filtrarLista();
    } catch (e) {
        console.error('Erro ao carregar motos:', e);
        document.getElementById('lista-motos').innerHTML =
            '<p class="text-red-600 text-sm text-center py-8">Erro ao carregar motos. Verifique a conexão.</p>';
    }
}

// ================================================================
// FILTRO + PAGINACAO + RENDER
// ================================================================
function filtrarLista() {
    const placa = document.getElementById('filtro-placa').value.toUpperCase().trim();
    const prop = document.getElementById('filtro-proprietario').value.toLowerCase().trim();

    estadoLista.filtradas = estadoLista.motos.filter(m => {
        const matchPlaca = !placa || (m.placa || '').toUpperCase().includes(placa);
        const matchProp = !prop || (m.proprietario || '').toLowerCase().includes(prop);
        return matchPlaca && matchProp;
    });

    estadoLista.pagina = 0;
    renderLista();
}

function renderLista() {
    const total = estadoLista.filtradas.length;
    const totalPaginas = Math.max(1, Math.ceil(total / PAGE_SIZE));
    const inicio = estadoLista.pagina * PAGE_SIZE;
    const fim = Math.min(inicio + PAGE_SIZE, total);
    const pagina = estadoLista.filtradas.slice(inicio, fim);

    document.getElementById('contador-lista').textContent =
        total === 0 ? 'Nenhuma moto' : `${total} ${total === 1 ? 'moto' : 'motos'}`;

    const lista = document.getElementById('lista-motos');
    if (total === 0) {
        lista.innerHTML = `
            <div class="bg-white rounded-xl p-8 text-center shadow-sm">
                <p class="text-slate-500 mb-3">Nenhuma moto encontrada</p>
                <button onclick="abrirFormNovo()" class="text-red-600 font-semibold">+ Cadastrar primeira moto</button>
            </div>`;
    } else {
        lista.innerHTML = pagina.map(m => renderCard(m)).join('');
    }

    // Pagina
    const pag = document.getElementById('paginacao');
    if (total > PAGE_SIZE) {
        pag.classList.remove('hidden');
        pag.classList.add('flex');
        document.getElementById('pag-info').textContent =
            `Página ${estadoLista.pagina + 1} de ${totalPaginas}`;
        document.getElementById('btn-pag-anterior').disabled = estadoLista.pagina === 0;
        document.getElementById('btn-pag-proxima').disabled = estadoLista.pagina >= totalPaginas - 1;
    } else {
        pag.classList.add('hidden');
        pag.classList.remove('flex');
    }
}

function renderCard(m) {
    const arquivada = document.getElementById('mostrar-arquivadas').checked;
    const km = (m.km_atual || 0).toLocaleString('pt-BR');
    return `
        <div class="bg-white rounded-xl p-3 shadow-sm border border-slate-100 ${arquivada ? 'opacity-60' : ''}">
            <div class="flex items-start justify-between gap-2">
                <div class="flex-1 min-w-0">
                    <div class="font-bold text-slate-900">${m.placa}</div>
                    <div class="text-sm text-slate-600 truncate">${m.modelo || '?'}${m.ano ? ' · ' + m.ano : ''}</div>
                    ${m.proprietario ? `<div class="text-xs text-slate-500 truncate">${m.proprietario}</div>` : ''}
                </div>
                <div class="text-right">
                    <div class="text-xs text-slate-500">km</div>
                    <div class="font-bold text-slate-900 text-sm">${km}</div>
                </div>
            </div>
            ${arquivada ? '' : `
            <div class="flex gap-2 mt-3 pt-3 border-t border-slate-100">
                <button onclick="abrirFormEdicao(${m.id})"
                        class="flex-1 text-xs py-1.5 bg-slate-100 hover:bg-slate-200 rounded font-medium">
                    Editar
                </button>
                <button onclick="abrirModalKm(${m.id})"
                        class="flex-1 text-xs py-1.5 bg-blue-100 hover:bg-blue-200 text-blue-700 rounded font-medium">
                    +Km
                </button>
                <button onclick="abrirModalDelete(${m.id})"
                        class="flex-1 text-xs py-1.5 bg-red-100 hover:bg-red-200 text-red-700 rounded font-medium">
                    Arquivar
                </button>
            </div>`}
            ${arquivada ? `
            <button onclick="reativarMoto('${m.placa}')"
                    class="w-full text-xs py-1.5 mt-3 bg-green-100 hover:bg-green-200 text-green-700 rounded font-medium">
                Reativar
            </button>` : ''}
        </div>`;
}

function mudarPagina(delta) {
    const total = estadoLista.filtradas.length;
    const totalPaginas = Math.ceil(total / PAGE_SIZE);
    estadoLista.pagina = Math.max(0, Math.min(totalPaginas - 1, estadoLista.pagina + delta));
    renderLista();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ================================================================
// FORMULARIO
// ================================================================
function abrirFormNovo() {
    estadoLista.motoEdicao = null;
    document.getElementById('form-titulo').textContent = 'Nova moto';
    document.getElementById('form-moto').reset();
    document.getElementById('moto-id').value = '';
    document.getElementById('form-erro').classList.add('hidden');
    abrirModal('modal-form');
}

async function abrirFormEdicao(id) {
    try {
        const { data, error } = await window.sb.from('motos').select('*').eq('id', id).single();
        if (error) throw error;

        estadoLista.motoEdicao = data;
        document.getElementById('form-titulo').textContent = 'Editar moto';
        document.getElementById('moto-id').value = data.id;
        document.getElementById('moto-placa').value = data.placa || '';
        document.getElementById('moto-modelo').value = data.modelo_id || '';
        document.getElementById('moto-ano').value = data.ano || '';
        document.getElementById('moto-cor').value = data.cor || '';
        document.getElementById('moto-chassi').value = data.chassi || '';
        document.getElementById('moto-renavam').value = data.renavam || '';
        document.getElementById('moto-proprietario').value = data.proprietario || '';
        document.getElementById('moto-telefone').value = data.telefone || '';
        document.getElementById('moto-email').value = data.email || '';
        document.getElementById('moto-data-compra').value = data.data_compra || '';
        document.getElementById('moto-km').value = data.km_atual || 0;
        document.getElementById('moto-observacoes').value = data.observacoes || '';
        document.getElementById('form-erro').classList.add('hidden');
        abrirModal('modal-form');
    } catch (e) {
        toast('Erro ao carregar dados', 'erro');
        console.error(e);
    }
}

async function salvarMoto(evt) {
    evt.preventDefault();
    const btn = document.getElementById('btn-salvar');
    const erroDiv = document.getElementById('form-erro');
    btn.disabled = true;
    btn.textContent = 'Salvando...';
    erroDiv.classList.add('hidden');

    const id = document.getElementById('moto-id').value;
    const dados = {
        placa: document.getElementById('moto-placa').value.trim().toUpperCase(),
        modelo_id: parseInt(document.getElementById('moto-modelo').value) || null,
        ano: parseInt(document.getElementById('moto-ano').value) || null,
        cor: document.getElementById('moto-cor').value.trim() || null,
        chassi: document.getElementById('moto-chassi').value.trim().toUpperCase() || null,
        renavam: document.getElementById('moto-renavam').value.trim() || null,
        proprietario: document.getElementById('moto-proprietario').value.trim() || null,
        telefone: document.getElementById('moto-telefone').value.trim() || null,
        email: document.getElementById('moto-email').value.trim() || null,
        data_compra: document.getElementById('moto-data-compra').value || null,
        km_atual: parseInt(document.getElementById('moto-km').value) || 0,
        observacoes: document.getElementById('moto-observacoes').value.trim() || null
    };

    try {
        let resp;
        if (id) {
            resp = await window.sb.from('motos').update(dados).eq('id', id);
        } else {
            resp = await window.sb.from('motos').insert(dados);
        }
        if (resp.error) throw resp.error;
        toast(id ? 'Moto atualizada' : 'Moto cadastrada');
        fecharModal('modal-form');
        await carregarMotos();
    } catch (e) {
        let msg = e.message || 'Erro ao salvar';
        if (e.code === '23505') msg = 'Já existe moto com essa placa';
        erroDiv.textContent = msg;
        erroDiv.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        btn.textContent = 'Salvar';
    }
}

// ================================================================
// QUICK KM
// ================================================================
function abrirModalKm(id) {
    const moto = estadoLista.motos.find(m => m.id === id);
    if (!moto) return;
    estadoLista.motoKm = moto;
    document.getElementById('km-info').textContent =
        `${moto.placa} · ${moto.modelo} · atual: ${(moto.km_atual || 0).toLocaleString('pt-BR')} km`;
    document.getElementById('km-novo').value = moto.km_atual || 0;
    abrirModal('modal-km');
    setTimeout(() => document.getElementById('km-novo').select(), 100);
}

async function salvarKm() {
    const m = estadoLista.motoKm;
    if (!m) return;
    const novo = parseInt(document.getElementById('km-novo').value);
    if (!Number.isFinite(novo) || novo < 0) {
        toast('Km inválido', 'erro');
        return;
    }
    if (novo < (m.km_atual || 0)) {
        if (!confirm(`Km menor que o atual (${m.km_atual}). Confirmar?`)) return;
    }
    try {
        const { error } = await window.sb.from('motos').update({ km_atual: novo }).eq('id', m.id);
        if (error) throw error;
        toast(`Km atualizado: ${novo.toLocaleString('pt-BR')}`);
        fecharModal('modal-km');
        await carregarMotos();
    } catch (e) {
        toast('Erro ao salvar km', 'erro');
    }
}

// ================================================================
// SOFT DELETE / REATIVAR
// ================================================================
function abrirModalDelete(id) {
    const moto = estadoLista.motos.find(m => m.id === id);
    if (!moto) return;
    estadoLista.motoDelete = moto;
    document.getElementById('delete-info').textContent =
        `${moto.placa} · ${moto.modelo} · ${moto.proprietario || 'sem proprietário'}`;
    abrirModal('modal-delete');
}

async function confirmarDelete() {
    const m = estadoLista.motoDelete;
    if (!m) return;
    try {
        const { error } = await window.sb.from('motos').update({ ativo: false }).eq('id', m.id);
        if (error) throw error;
        toast('Moto arquivada');
        fecharModal('modal-delete');
        await carregarMotos();
    } catch (e) {
        toast('Erro ao arquivar', 'erro');
    }
}

async function reativarMoto(placa) {
    if (!confirm(`Reativar moto ${placa}?`)) return;
    try {
        const { error } = await window.sb.from('motos').update({ ativo: true }).eq('placa', placa);
        if (error) throw error;
        toast('Moto reativada');
        await carregarMotos();
    } catch (e) {
        toast('Erro ao reativar', 'erro');
    }
}

// ================================================================
// MODAL HELPERS
// ================================================================
function abrirModal(id) {
    const el = document.getElementById(id);
    el.classList.remove('hidden');
    el.classList.add('flex');
}
function fecharModal(id) {
    const el = document.getElementById(id);
    el.classList.add('hidden');
    el.classList.remove('flex');
}

boot();
</script>
</body>
